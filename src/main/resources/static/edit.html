<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>글 수정하기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 50px 0; background-color: #f8f9fa; }
        .container { max-width: 700px; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container">
    <h2 class="fw-bold mb-4">게시글 수정</h2>
    
    <div class="mb-3">
        <label class="form-label">제목</label>
        <input type="text" id="title" class="form-control">
    </div>
    
    <div class="mb-3">
        <label class="form-label">내용</label>
        <textarea id="content" class="form-control" rows="10"></textarea>
    </div>

    <div class="mb-4">
        <label class="form-label fw-bold">📎 파일 교체 (선택)</label>
        <input type="file" id="fileInput" class="form-control">
        <div id="oldFileName" class="form-text text-primary"></div>
    </div>

    <div class="d-flex justify-content-end">
        <button class="btn btn-secondary me-2" onclick="history.back()">취소</button>
        <button class="btn btn-success px-4" onclick="updateBoard()">수정 완료</button>
    </div>
</div>

<script src="/js/nav.js"></script>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const boardId = urlParams.get('id');

    // 페이지 로드 시 기존 데이터 채우기
    document.addEventListener('DOMContentLoaded', async () => {
        if (!boardId) {
            alert("잘못된 접근입니다.");
            location.href = "/";
            return;
        }

        try {
            const response = await fetch(`/api/boards/${boardId}`);
            const b = await response.json();

            document.getElementById('title').value = b.title;
            document.getElementById('content').value = b.content;
            if (b.originFileName) {
                document.getElementById('oldFileName').innerText = `기존 파일: ${b.originFileName}`;
            }
        } catch (e) {
            console.error(e);
            alert("데이터를 불러오지 못했습니다.");
        }
    });

    // 수정 완료 버튼 클릭 시
    async function updateBoard() {
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;
        const fileInput = document.getElementById('fileInput');

        if (!title.trim() || !content.trim()) return alert("내용을 채워주세요.");

        // 파일을 포함할 수 있으므로 FormData 사용
        const formData = new FormData();
        const boardData = { title: title, content: content };
        formData.append("board", new Blob([JSON.stringify(boardData)], { type: "application/json" }));
        
        if (fileInput.files[0]) {
            formData.append("file", fileInput.files[0]);
        }

        try {
            const response = await fetch(`/api/boards/${boardId}`, {
                method: 'PUT', // ⭐ 수정은 PUT 방식을 사용합니다.
                body: formData
            });

            if (response.ok) {
                alert("수정되었습니다.");
                location.href = `/detail.html?id=${boardId}`;
            } else {
                alert("수정에 실패했습니다.");
            }
        } catch (e) { console.error(e); }
    }
</script>
</body>
</html>
