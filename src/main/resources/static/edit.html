<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>글 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 700px;">
    <div id="common-header"></div>
    <div class="bg-white p-4 rounded shadow-sm">
        <h3 class="fw-bold mb-4">게시글 수정</h3>
        <div class="mb-3">
            <label class="form-label">제목</label>
            <input type="text" id="title" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">내용</label>
            <textarea id="content" class="form-control" rows="10"></textarea>
        </div>
        <div class="d-flex justify-content-end gap-2">
            <button class="btn btn-secondary" onclick="history.back()">취소</button>
            <button class="btn btn-warning px-4" onclick="updateBoard()">수정완료</button>
        </div>
    </div>
</div>
<script src="/js/nav.js"></script>
<script>
    const boardId = new URLSearchParams(window.location.search).get('id');
    window.addEventListener('load', () => {
        fetch(`/api/boards/${boardId}`).then(res => res.json()).then(board => {
            document.getElementById('title').value = board.title;
            document.getElementById('content').value = board.content;
        });
    });

    function updateBoard() {
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;
        fetch(`/api/boards/${boardId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ title, content })
        }).then(res => res.ok ? location.href=`/detail.html?id=${boardId}` : alert("실패"));
    }
</script>
</body>
</html>
