<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - My Spring Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .join-container { max-width: 400px; width: 100%; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="join-container">
    <h3 class="text-center mb-4">회원가입</h3>
    <div class="mb-3">
        <label class="form-label">아이디</label>
        <input type="text" id="username" class="form-control" placeholder="아이디를 입력하세요">
    </div>
    <div class="mb-3">
        <label class="form-label">비밀번호</label>
        <input type="password" id="password" class="form-control" placeholder="비밀번호를 입력하세요">
    </div>
    <div class="mb-3">
        <label class="form-label">닉네임</label>
        <input type="text" id="nickname" class="form-control" placeholder="사용할 닉네임을 입력하세요">
    </div>
    <button onclick="join()" class="btn btn-primary w-100 mb-2">가입하기</button>
    <button onclick="location.href='/index.html'" class="btn btn-outline-secondary w-100">취소</button>
</div>

<script>
    function join() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const nickname = document.getElementById('nickname').value;

        if(!username || !password || !nickname) {
            alert("모든 필드를 입력해주세요.");
            return;
        }

        const memberData = { username, password, nickname };

        fetch('/api/members/join', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(memberData)
        })
        .then(res => {
            if(res.ok) {
                alert("회원가입이 완료되었습니다! 로그인해주세요.");
                location.href = "/login"; // 가입 후 스프링 시큐리티 기본 로그인 페이지로 이동
            } else {
				alert("이미 존재하는 아이디이거나 가입에 실패했습니다.");
            }
        })
        .catch(err => alert("서버 통신 오류가 발생했습니다."));
}
</script>

</body>
</html>
