<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스프링 게시판 - 통합 버전</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px 0; background-color: #f4f7f6; }
        .container { max-width: 900px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .user-bar { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .post-title { cursor: pointer; color: #007bff; font-weight: 500; }
        .post-title:hover { text-decoration: underline; color: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <div class="user-bar d-flex justify-content-between align-items-center">
        <div>
            <h4 class="m-0">🚀 My Spring Board</h4>
        </div>
        <div id="auth-zone">
            <div id="logout-status">
                <button class="btn btn-outline-primary btn-sm" onclick="location.href='/login'">로그인</button>
                <button class="btn btn-primary btn-sm" onclick="location.href='/join.html'">회원가입</button>
            </div>
            <div id="login-status" style="display: none;">
                <span id="welcome-msg" class="me-2 fw-bold text-primary"></span>
                <button class="btn btn-outline-danger btn-sm" onclick="location.href='/logout'">로그아웃</button>
            </div>
        </div>
    </div>

    <div class="card border-0 bg-light mb-4">
        <div class="card-body">
            <h5 class="card-title fw-bold mb-3">새 글 쓰기</h5>
            <div class="row g-2 mb-3">
                <div class="col-md-4">
                    <input type="text" id="author" class="form-control" placeholder="작성자">
                </div>
                <div class="col-md-8">
                    <input type="text" id="title" class="form-control" placeholder="제목">
                </div>
            </div>
            <div class="mb-3">
                <textarea id="content" class="form-control" rows="3" placeholder="내용을 입력하세요"></textarea>
            </div>
            <button onclick="saveBoard()" class="btn btn-primary px-4 w-100">등록하기</button>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-6 offset-md-3">
            <div class="input-group shadow-sm">
                <input type="text" id="searchKeyword" class="form-control" placeholder="제목으로 검색">
                <button class="btn btn-dark" onclick="searchBoard()">검색</button>
            </div>
        </div>
    </div>

    <div class="board-list">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th style="width: 8%">ID</th>
                    <th style="width: 55%">제목</th>
                    <th style="width: 20%">작성자</th>
                    <th style="width: 17%" class="text-center">관리</th>
                </tr>
            </thead>
