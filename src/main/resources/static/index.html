<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>JPA Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px 0; background-color: #f8f9fa; }
        /* 아래 9번 라인을 정확히 확인해 주세요 */
        .container { max-width: 950px; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .post-link { color: #333; text-decoration: none; font-weight: 500; }
        .post-link:hover { color: #007bff; text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <div id="common-header"></div> 

    <div class="d-flex justify-content-between align-items-end mb-4">
        <div>
            <h2 class="fw-bold m-0">자유게시판</h2>
            <p class="text-muted m-0 mt-1">다양한 이야기를 나누어 보세요.</p>
        </div>
        <button class="btn btn-primary px-4 fw-bold shadow-sm" onclick="goToWrite()">글쓰기</button>
    </div>

    <table class="table table-hover align-middle mb-4">
        <thead>
            <tr class="text-center table-light">
                <th style="width: 70px;">번호</th>
                <th class="text-start ps-4">제목</th>
                <th style="width: 120px;">작성자</th>
                <th style="width: 130px;">작성일</th>
                <th style="width: 80px;">조회수</th>
            </tr>
        </thead>
        <tbody id="board-body">
            <tr><td colspan="5" class="text-center py-5 text-muted">데이터를 불러오는 중입니다...</td></tr>
        </tbody>
    </table>

    <div class="mb-4" style="max-width: 400px; margin: 0 auto;">
        <div class="input-group shadow-sm">
            <input type="text" id="searchKeyword" class="form-control" placeholder="제목으로 검색">
            <button class="btn btn-dark" onclick="searchBoard()">검색</button>
        </div>
    </div>

    <div class="d-flex justify-content-center align-items-center">
        <button id="prevBtn" class="btn btn-sm btn-outline-dark me-3" onclick="changePage(-1)">이전</button>
        <span id="pageInfo" class="fw-bold">1 / 1</span>
        <button id="nextBtn" class="btn btn-sm btn-outline-dark ms-3" onclick="changePage(1)">다음</button>
    </div>
</div>

<script src="/js/nav.js"></script>
<script>
    let currentPage = 0;
    let currentKeyword = "";

    document.addEventListener('DOMContentLoaded', () => {
        getBoards();
        const searchInput = document.getElementById('searchKeyword');
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchBoard();
        });
    });

	function getBoards() {
	    fetch(`/api/boards?page=${currentPage}&keyword=${encodeURIComponent(currentKeyword)}`)
	        .then(res => res.json())
	        .then(page => {
	            const tbody = document.getElementById('board-body');
	            tbody.innerHTML = '';
	            
	            if (page.content.length === 0) {
	                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5 text-muted">결과가 없습니다.</td></tr>';
	                return;
	            }

	            // ⭐ 여기서부터 반복문이 시작됩니다.
	            page.content.forEach(b => {
	                // 이제 'b'는 리스트에서 꺼내온 '게시글 한 개'를 의미하므로 사용 가능합니다!
	                const nickname = b.member ? b.member.nickname : '익명';
	                const dateStr = b.createDate ? b.createDate.split('T')[0] : '-';
	                
	                // ⭐ 좋아요 배지 생성 로직을 여기로 이동!
	                const likeBadge = (b.likeCount > 0) 
	                    ? `<span class="text-danger small ms-1" style="font-weight: bold;">❤️${b.likeCount}</span>` 
	                    : '';
	                
	                tbody.innerHTML += `
	                    <tr class="text-center">
	                        <td>${b.id}</td>
	                        <td class="text-start ps-4">
	                            <a href="/detail.html?id=${b.id}" class="post-link">${b.title}</a>
	                            ${likeBadge}
	                        </td>
	                        <td><span class="badge bg-light text-dark fw-normal">${nickname}</span></td>
	                        <td class="text-muted small">${dateStr}</td>
	                        <td class="fw-bold text-secondary">${b.hits}</td>
	                    </tr>`;
	            });

	            document.getElementById('pageInfo').innerText = `${currentPage + 1} / ${page.totalPages || 1}`;
	            document.getElementById('prevBtn').disabled = page.first;
	            document.getElementById('nextBtn').disabled = page.last || page.totalPages === 0;
	        });
	}

    function searchBoard() {
        const keywordInput = document.getElementById('searchKeyword');
        const keyword = keywordInput.value.trim();

        if (keyword === "") {
            alert("검색어를 입력해주세요.");
            keywordInput.focus();
            return;
        }

        currentKeyword = keyword;
        currentPage = 0;
        getBoards();
    }

    function changePage(delta) {
        currentPage += delta;
        getBoards();
    }

    function goToWrite() {
        if (!window.currentUser) {
            alert("로그인이 필요합니다.");
            location.href = "/login";
        } else {
            location.href = "/write.html";
        }
    }
</script>
</body>
</html>
