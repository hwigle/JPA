<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세보기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px 0; background-color: #f8f9fa; }
        .container { max-width: 800px; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .post-content { min-height: 200px; border-top: 1px solid #eee; padding: 30px 0; margin: 20px 0; line-height: 1.8; white-space: pre-wrap; }
        .file-box { background: #f1f3f5; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        #likeBtn.active { background-color: #dc3545; color: white; border-color: #dc3545; }
        .comment-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .comment-date { font-size: 0.75rem; color: #6c757d; }
    </style>
</head>
<body>

<div class="container">
    <div id="common-header"></div>

    <div class="mb-4">
        <h2 id="title" class="fw-bold mb-3">로딩 중...</h2>
        <div class="d-flex justify-content-between text-muted small">
            <div>
                <span id="nickname" class="badge bg-light text-dark fw-normal me-2">작성자</span>
                <span id="createDate">날짜</span>
            </div>
            <div>조회수 <b id="hits">0</b></div>
        </div>
    </div>

    <div id="content" class="post-content">내용을 불러오는 중입니다...</div>

	<div id="imagePreviewContainer" class="my-4 text-center" style="display: none;"></div>
	
    <div id="fileSection" class="file-box" style="display: none;">
        <span class="fw-bold small me-2">📎 첨부파일:</span>
        <a id="fileLink" href="#" class="text-decoration-none fw-bold" download>파일명</a>
    </div>

    <div class="text-center my-5">
        <button id="likeBtn" class="btn btn-outline-danger btn-lg rounded-pill px-4 shadow-sm" onclick="toggleLike()">
            <span id="likeIcon">🤍</span> 좋아요 <span id="likeCount" class="badge bg-danger ms-2">0</span>
        </button>
    </div>

    <div class="mt-5">
        <h4 class="fw-bold mb-4">댓글 (<span id="commentCount">0</span>)</h4>
        <div class="card mb-4 border-0 bg-light">
            <div class="card-body">
                <textarea id="commentInput" class="form-control mb-2" rows="3" placeholder="댓글을 남겨보세요."></textarea>
                <div class="d-flex justify-content-end">
                    <button class="btn btn-primary px-4" onclick="saveComment()">등록</button>
                </div>
            </div>
        </div>
        <div id="commentList"></div>
    </div>

    <div class="d-flex justify-content-between mt-5">
        <button class="btn btn-secondary px-4" onclick="location.href='/'">목록으로</button>
        <div id="authButtons" style="display: none;">
            <button class="btn btn-outline-dark me-2" onclick="goToEdit()">수정</button>
            <button class="btn btn-outline-danger" onclick="deletePost()">삭제</button>
        </div>
    </div>
</div>

<script src="/js/nav.js"></script>
<script>
    const boardId = new URLSearchParams(window.location.search).get('id');
    window.currentBoard = null; // 게시글 데이터를 전역에 보관

    document.addEventListener('DOMContentLoaded', () => {
        if (!boardId) return;
        loadDetail();
        fetchLikeCount();
        checkLikeStatus();
        fetchComments();
    });

	// 헬퍼 함수: 파일명이 이미지 확장자인지 확인
    function isImageFile(filename) {
        if (!filename) return false;
        const lowerName = filename.toLowerCase();
        // jpg, jpeg, png, gif 등 흔한 이미지 확장자 체크
        return lowerName.endsWith('.jpg') || lowerName.endsWith('.jpeg') ||
               lowerName.endsWith('.png') || lowerName.endsWith('.gif') ||
               lowerName.endsWith('.bmp') || lowerName.endsWith('.webp');
    }
	
    // 1. 게시글 상세 정보 로드
    async function loadDetail() {
        try {
            const res = await fetch(`/api/boards/${boardId}`);
            const b = await res.json();
            window.currentBoard = b; // 전역 변수에 저장

            document.getElementById('title').innerText = b.title;
            document.getElementById('content').innerText = b.content;
            document.getElementById('nickname').innerText = b.member?.nickname || '익명';
            document.getElementById('hits').innerText = b.hits;
            document.getElementById('createDate').innerText = b.createDate ? b.createDate.substring(0, 10) : '-';

			// 파일 처리 로직
            const fileSection = document.getElementById('fileSection');
            const fileLink = document.getElementById('fileLink');
            const imagePreviewContainer = document.getElementById('imagePreviewContainer');

            // 초기화 (이전 내용 지우기)
            fileSection.style.display = 'none';
            imagePreviewContainer.style.display = 'none';
            imagePreviewContainer.innerHTML = '';

            if (b.storedFileName) {
                const fileUrl = `/files/${b.storedFileName}`; // 외부 경로 매핑된 주소

                // 1. 다운로드 링크 설정 (모든 파일 공통)
                fileSection.style.display = 'block';
                fileLink.href = fileUrl;
                fileLink.innerText = b.originFileName;
                fileLink.setAttribute('download', b.originFileName);

                // 2. 이미지 파일인 경우 미리보기 추가
                if (isImageFile(b.originFileName)) {
                    imagePreviewContainer.style.display = 'block';
                    // 부트스트랩 클래스로 스타일링 (반응형, 모서리 둥글게, 그림자)
                    imagePreviewContainer.innerHTML = `
                        <img src="${fileUrl}" alt="${b.originFileName}" 
                             class="img-fluid rounded shadow-sm border" style="max-height: 600px;">`;
                }
            }

            // 작성자 본인 확인 함수 실행
            checkOwnership();
        } catch (e) { console.error(e); }
    }

    // ⭐ 수정/삭제 버튼 노출 로직 (비동기 대응)
    function checkOwnership() {
        // window.currentUser가 아직 로딩 전(nav.js 작업 중)이라면 0.1초 뒤에 다시 확인
        if (typeof window.currentUser === 'undefined') {
            setTimeout(checkOwnership, 100);
            return;
        }

        const b = window.currentBoard;
        // 로그인한 유저가 있고, 게시글 작성자가 있을 때 ID 비교 (== 사용)
        if (window.currentUser && b && b.member && window.currentUser.id == b.member.id) {
            document.getElementById('authButtons').style.display = 'block';
        }
    }

    // 2. 댓글 목록 로드
    async function fetchComments() {
        const res = await fetch(`/api/comments/${boardId}`);
        if (!res.ok) return;
        const comments = await res.json();
        const listDiv = document.getElementById('commentList');
        document.getElementById('commentCount').innerText = comments.length;
        
        listDiv.innerHTML = comments.map(c => `
            <div class="comment-item">
                <div class="d-flex justify-content-between mb-1">
                    <span class="fw-bold small">${c.member.nickname}</span>
                    <span class="comment-date">${c.createDate}</span>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <div>${c.content}</div>
                    ${(window.currentUser && window.currentUser.id == c.member.id) ? 
                        `<button class="btn btn-sm text-danger" onclick="deleteComment(${c.id})">삭제</button>` : ''}
                </div>
            </div>
        `).join('') || '<p class="text-muted">첫 댓글을 남겨보세요!</p>';
    }

    // 3. 댓글 저장/삭제
    async function saveComment() {
        if (!window.currentUser) return alert("로그인이 필요합니다.");
        const content = document.getElementById('commentInput').value;
        if (!content.trim()) return alert("내용을 입력하세요.");
        const res = await fetch(`/api/comments/${boardId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content })
        });
        if (res.ok) { document.getElementById('commentInput').value = ''; fetchComments(); }
    }
    async function deleteComment(id) { if (confirm("삭제할까요?")) { await fetch(`/api/comments/${id}`, { method: 'DELETE' }); fetchComments(); } }

    // 4. 좋아요 관련
    async function fetchLikeCount() {
        const res = await fetch(`/api/boards/${boardId}/likes/count`);
        const data = await res.json();
        const count = (typeof data === 'object') ? data.count : data;
        document.getElementById('likeCount').innerText = count || 0;
    }
    async function toggleLike() {
        if (!window.currentUser) return location.href = "/login";
        const res = await fetch(`/api/boards/${boardId}/like`, { method: 'POST' });
        if (res.ok) { updateLikeUI(await res.json()); fetchLikeCount(); }
    }
    async function checkLikeStatus() {
        if (!window.currentUser) return;
        const res = await fetch(`/api/boards/${boardId}/like/status`);
        if (res.ok) updateLikeUI(await res.json());
    }
    function updateLikeUI(isLiked) {
        const btn = document.getElementById('likeBtn');
        btn.classList.toggle('active', isLiked);
        document.getElementById('likeIcon').innerText = isLiked ? '❤️' : '🤍';
    }

    // 5. 게시글 수정/삭제 버튼 동작
    function goToEdit() { location.href = `/edit.html?id=${boardId}`; }
    async function deletePost() {
        if (confirm("게시글을 삭제하시겠습니까?")) {
            await fetch(`/api/boards/${boardId}`, { method: 'DELETE' });
            location.href = "/";
        }
    }
</script>
</body>
</html>
