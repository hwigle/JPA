<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>새 글 쓰기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width: 700px;">
    <div id="common-header"></div>
    <div class="bg-white p-4 rounded shadow-sm">
        <h3 class="fw-bold mb-4">새 글 작성</h3>
        <div class="mb-3">
            <input type="text" id="title" class="form-control" placeholder="제목">
        </div>
        <div class="mb-3">
            <textarea id="content" class="form-control" rows="10" placeholder="내용"></textarea>
        </div>
        <div class="d-flex justify-content-end gap-2">
            <button class="btn btn-secondary" onclick="location.href='/'">취소</button>
            <button class="btn btn-primary px-4" onclick="saveBoard()">등록</button>
        </div>
    </div>
</div>
<script src="/js/nav.js"></script>
<script>
    function saveBoard() {
        const title = document.getElementById('title').value;
        const content = document.getElementById('content').value;
        fetch('/api/boards', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ title, content })
        }).then(res => res.ok ? location.href='/' : alert("실패"));
    }
</script>
</body>
</html>
